<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospitals</title>
  <link rel="stylesheet" href="CSS/style.css" />
  <link rel="stylesheet" href="CSS/report.css" />
  <script src="https://www.gstatic.com/firebasejs/12.4.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.4.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.4.0/firebase-firestore-compat.js"></script>
  <script src="auth.js" defer></script>
</head>

<body>
  <header class="header">
    <div class="logo"><a href="index.html"><img src="Images/logo.png" alt="logo" /></a></div>
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="Hospital.html">Hospitals</a></li>
        <li><a href="first_aid.html">First Aid</a></li>
        <li class="new-item auth-container">
          <div class="profile-wrapper" id="profileWrapper">
            <img id="avatarCircle" class="avatar-img" src="" alt="profile">
            <div class="dropdown-menu" id="dropdownMenu">

              <div class="user-info">
                <strong id="dropdownName"></strong>
                <small id="dropdownEmail"></small>
              </div>
              <hr>
              <button id="logoutBtn">Logout</button>
            </div>
          </div>

          <div id="loginLinks">
            <a href="Login.html" class="nav-login">Login</a>
            <a href="Register.html" class="nav-register">Register</a>
          </div>

        </li>
      </ul>
    </nav>
  </header>

  <main class="container" style="margin-top:24px; margin-bottom:48px;">
    <section class="card" style="padding:18px 20px; margin-bottom:18px;">
      <h1 style="margin:0 0 8px; color:#183a75;">Nearby Hospitals</h1>
      <p style="margin:0; color:#5a6ea8;">Allow location to list hospitals around you with distance and quick call
        directions.</p>
      <div style="margin-top:12px;">
        <button id="findHospitals" class="btn btn-primary">Find hospitals near me</button>
      </div>
    </section>

    <section id="hospitalList" class="card" style="padding:12px 0;">
      <!-- JS will inject list items -->
      <ul id="hList" style="list-style:none; margin:0; padding:0;"></ul>
    </section>
  </main>

  <script src="JavaScript/hospital_find.js"></script>
  <script src="JavaScript/firebase.js"></script>
  <script src="JavaScript/auth.js"></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBsZHAc0hsb8asR_jSMrzEyH5pC-DxexCE&libraries=places"></script>
</body>

</html>
